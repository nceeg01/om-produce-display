<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Customer Pickup — OM Produce</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@300;400;500;600;700;800;900&family=Barlow:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:         #0E0C09;
      --surface:    #1A1610;
      --surface2:   #221D13;
      --border:     #35291A;
      --text:       #F0E6D4;
      --muted:      #8A7558;
      --orange:     #E8711A;
      --orange-dim: #2D1B08;
      --olive:      #5B8A2A;
      --olive-dim:  #172010;
      --red:        #C83A28;
      --red-dim:    #2A1009;
      --amber:      #C98510;
      --amber-dim:  #271B04;
      --gray:       #5A5248;
    }
    * { margin:0; padding:0; box-sizing:border-box; }
    html,body { height:100%; overflow:hidden; }
    body { background:var(--bg); color:var(--text); font-family:'Barlow',sans-serif; display:flex; flex-direction:column; }

    /* ── HEADER ── */
    .hdr {
      display:flex; align-items:center; height:60px; flex-shrink:0;
      background:var(--surface); border-bottom:3px solid var(--orange); padding:0 32px;
    }
    .logo-w { display:flex; align-items:center; gap:12px; }
    .logo-sq { width:34px; height:34px; background:var(--orange); border-radius:6px; display:flex; align-items:center; justify-content:center; font-family:'Barlow Condensed',sans-serif; font-size:17px; font-weight:900; color:#fff; }
    .logo-n { font-family:'Barlow Condensed',sans-serif; font-size:20px; font-weight:800; letter-spacing:2px; text-transform:uppercase; }
    .logo-n em { color:var(--orange); font-style:normal; }
    .hdr-tag { font-family:'Barlow Condensed',sans-serif; font-size:12px; font-weight:700; letter-spacing:2px; text-transform:uppercase; color:var(--muted); border-left:1px solid var(--border); padding-left:20px; margin-left:20px; }
    .hdr-r { margin-left:auto; display:flex; align-items:center; gap:16px; }
    .hdr-clock { font-family:'Barlow Condensed',sans-serif; font-size:32px; font-weight:700; letter-spacing:2px; color:var(--text); }
    .live-badge {
      display:flex; align-items:center; gap:6px; padding:4px 12px; border-radius:20px;
      font-family:'Barlow Condensed',sans-serif; font-size:11px; font-weight:700; letter-spacing:1.5px;
      background:var(--olive-dim); border:1px solid rgba(91,138,42,.3); color:var(--olive);
    }
    .ldot { width:7px; height:7px; border-radius:50%; background:var(--olive); animation:lp 2s infinite; }
    @keyframes lp{0%,100%{box-shadow:0 0 0 0 rgba(91,138,42,.5);}60%{box-shadow:0 0 0 6px rgba(91,138,42,0);}}

    /* ── MAIN SPLIT ── */
    .main { flex:1; display:grid; grid-template-columns:1fr 1fr; overflow:hidden; }

    /* ── NOW SERVING ── */
    .ns {
      display:flex; flex-direction:column; align-items:center; justify-content:center;
      padding:40px 48px; position:relative; overflow:hidden;
      background: radial-gradient(ellipse at center, rgba(91,138,42,0.07) 0%, transparent 70%), var(--bg);
      border-right:2px solid var(--border);
    }
    .ns::before {
      content:''; position:absolute; top:0; left:0; right:0; height:3px;
      background:linear-gradient(90deg, transparent, var(--olive), transparent);
    }
    .ns-eyebrow {
      font-family:'Barlow Condensed',sans-serif; font-size:14px; font-weight:700; letter-spacing:5px;
      text-transform:uppercase; color:var(--olive); opacity:.7; margin-bottom:24px;
      display:flex; align-items:center; gap:16px; width:100%; justify-content:center;
    }
    .ns-eyebrow::before,.ns-eyebrow::after { content:''; flex:1; height:1px; background:rgba(91,138,42,.2); }
    #ns-name {
      font-family:'Barlow Condensed',sans-serif;
      font-size:clamp(44px,7vw,92px); font-weight:900;
      color:#F8F0E4; text-align:center; line-height:1;
      text-transform:uppercase; letter-spacing:1px; word-break:break-word;
    }
    #ns-name.pop { animation:pop .4s ease-out; }
    @keyframes pop { from{opacity:0;transform:scale(.96)translateY(8px);}to{opacity:1;transform:none;} }
    #ns-meta {
      display:flex; gap:16px; margin-top:22px; flex-wrap:wrap; justify-content:center;
    }
    .ns-pill {
      padding:7px 20px; border-radius:5px;
      font-family:'Barlow Condensed',sans-serif; font-size:20px; font-weight:800; letter-spacing:1px;
    }
    .np-inv  { background:rgba(91,138,42,.12); color:var(--olive); border:1px solid rgba(91,138,42,.25); }
    .np-box  { background:rgba(232,113,26,.12); color:var(--orange); border:1px solid rgba(232,113,26,.25); }
    .ns-ready-tag {
      margin-top:26px; display:inline-flex; align-items:center; gap:8px;
      background:var(--olive); color:#fff; padding:10px 28px; border-radius:5px;
      font-family:'Barlow Condensed',sans-serif; font-size:20px; font-weight:900; letter-spacing:2px; text-transform:uppercase;
    }
    .ns-empty { text-align:center; }
    .ns-empty .eicon { font-size:52px; opacity:.25; margin-bottom:20px; }
    .ns-empty h2 { font-family:'Barlow Condensed',sans-serif; font-size:28px; font-weight:700; text-transform:uppercase; letter-spacing:2px; color:var(--muted); }
    .ns-empty p { color:var(--muted); margin-top:8px; font-size:15px; }

    /* ── QUEUE PANEL ── */
    .qpanel { display:flex; flex-direction:column; overflow:hidden; background:var(--bg); }
    .qhdr {
      display:flex; align-items:center; gap:12px; padding:14px 28px; flex-shrink:0;
      background:var(--surface); border-bottom:1px solid var(--border);
    }
    .qlabel { font-family:'Barlow Condensed',sans-serif; font-size:16px; font-weight:800; letter-spacing:2px; text-transform:uppercase; color:var(--muted); }
    .qbadge { background:rgba(232,113,26,.15); color:var(--orange); border:1px solid rgba(232,113,26,.25); border-radius:20px; padding:3px 12px; font-family:'Barlow Condensed',sans-serif; font-size:17px; font-weight:800; }
    .q-summary { margin-left:auto; font-size:12px; color:var(--muted); }

    .qscroll { flex:1; overflow-y:auto; }
    .qscroll::-webkit-scrollbar { width:3px; }
    .qscroll::-webkit-scrollbar-thumb { background:var(--border); border-radius:2px; }

    .sec-hdr {
      padding:7px 28px; font-family:'Barlow Condensed',sans-serif;
      font-size:11px; font-weight:700; letter-spacing:2px; text-transform:uppercase;
      color:var(--muted); background:var(--surface2); border-bottom:1px solid var(--border);
    }
    .qitem {
      display:flex; align-items:center; gap:14px; padding:14px 28px;
      border-bottom:1px solid var(--border); transition:background .15s;
    }
    .qitem:hover { background:var(--surface2); }
    .qitem.dimmed { opacity:.5; }
    .qpos { font-family:'Barlow Condensed',sans-serif; font-size:26px; font-weight:900; color:var(--muted); min-width:36px; }
    .qinfo { flex:1; }
    .qname { font-family:'Barlow Condensed',sans-serif; font-size:30px; font-weight:800; color:var(--text); line-height:1; }
    .qsub { display:flex; gap:10px; align-items:center; margin-top:4px; }
    .qinv { font-size:12px; color:var(--muted); font-family:monospace; }
    .qboxes { font-family:'Barlow Condensed',sans-serif; font-size:18px; font-weight:900; color:var(--orange); }
    .qstag {
      font-family:'Barlow Condensed',sans-serif; font-size:12px; font-weight:700; letter-spacing:.5px;
      padding:2px 9px; border-radius:3px; text-transform:uppercase;
    }
    .qt-proc { background:rgba(201,133,16,.12); color:var(--amber); border:1px solid rgba(201,133,16,.2); }
    .qt-np   { background:rgba(200,58,40,.1);  color:var(--red);   border:1px solid rgba(200,58,40,.15); }
    .qt-dn   { background:rgba(90,82,72,.15);  color:var(--gray);  border:1px solid rgba(90,82,72,.15); }
    .qempty { text-align:center; padding:48px 28px; color:var(--muted); font-size:14px; line-height:1.6; }

    /* ── BOTTOM ── */
    .btm { height:34px; flex-shrink:0; padding:0 32px; background:var(--surface); border-top:1px solid var(--border); display:flex; align-items:center; font-size:11px; color:var(--muted); }
    .btm-r { margin-left:auto; display:flex; align-items:center; gap:10px; }
    #last-upd { color:var(--muted); }
    #cdown { color:var(--orange); font-weight:600; }
    .sl { color:var(--muted); text-decoration:none; }
    .sl:hover { color:var(--orange); }

    /* overlay */
    .ov { position:fixed; inset:0; background:rgba(14,12,9,.96); display:flex; align-items:center; justify-content:center; z-index:100; }
    .ovb { background:var(--surface); border:1px solid var(--border); border-radius:10px; padding:48px; max-width:500px; text-align:center; }
    .ov-icon { width:52px; height:52px; background:var(--orange); border-radius:9px; display:flex; align-items:center; justify-content:center; font-family:'Barlow Condensed',sans-serif; font-size:24px; font-weight:900; color:#fff; margin:0 auto 18px; }
    .ovb h1 { font-family:'Barlow Condensed',sans-serif; font-size:28px; font-weight:900; color:var(--text); letter-spacing:2px; text-transform:uppercase; margin-bottom:8px; }
    .ovb p { color:var(--muted); font-size:13px; line-height:1.7; margin-bottom:22px; }
    .ov-in { width:100%; background:var(--bg); border:1px solid var(--border); border-radius:6px; padding:12px 14px; color:var(--text); font-family:monospace; font-size:12px; outline:none; margin-bottom:12px; }
    .ov-in:focus { border-color:var(--orange); }
    .ov-btn { width:100%; background:var(--orange); color:#fff; font-family:'Barlow Condensed',sans-serif; font-size:15px; font-weight:800; letter-spacing:2px; text-transform:uppercase; padding:13px; border:none; border-radius:6px; cursor:pointer; }
    .ov-btn:hover { filter:brightness(1.1); }
    .ov-err { margin-top:10px; font-size:12px; color:var(--red); min-height:16px; }
  </style>
</head>
<body>

<div class="ov" id="ov" style="display:none">
  <div class="ovb">
    <div class="ov-icon">OM</div>
    <h1>Customer Pickup</h1>
    <p>Enter your Google Sheet CSV URL to show the live pickup queue.</p>
    <input class="ov-in" id="ov-url" placeholder="https://docs.google.com/spreadsheets/d/…/pub?output=csv">
    <button class="ov-btn" onclick="connectOv()">Connect Display</button>
    <div class="ov-err" id="ov-err"></div>
  </div>
</div>

<div class="hdr">
  <div class="logo-w">
    <div class="logo-sq">OM</div>
    <div class="logo-n"><em>OM</em> Produce</div>
  </div>
  <div class="hdr-tag">🛒 Customer Pickup</div>
  <div class="hdr-r">
    <div class="live-badge"><div class="ldot"></div><span id="ltxt">Live</span></div>
    <div class="hdr-clock" id="clk">--:--</div>
  </div>
</div>

<div class="main">
  <!-- NOW SERVING -->
  <div class="ns">
    <div class="ns-eyebrow">Now Serving</div>
    <div id="ns-content">
      <div class="ns-empty">
        <div class="eicon">⏳</div>
        <h2>Loading…</h2>
      </div>
    </div>
  </div>

  <!-- QUEUE -->
  <div class="qpanel">
    <div class="qhdr">
      <div class="qlabel">Next Up</div>
      <div class="qbadge" id="qcnt">0</div>
      <div class="q-summary" id="q-sum"></div>
    </div>
    <div class="qscroll" id="qlist"></div>
  </div>
</div>

<div class="btm">
  <span>OM Produce Display System</span>
  <div class="btm-r">
    <span id="last-upd">—</span>
    <span id="cdown"></span>
    <a class="sl" href="index.html">⚙ Settings</a>
  </div>
</div>

<script>
const KEY='om_produce_sheet_url';
const DEFAULT='https://docs.google.com/spreadsheets/d/e/2PACX-1vQHnlcNDAql97kEYtWkiV6ofkHMsxMNxJ9-b_sgCVX7sFhBrVRHHCb0Xt4ELJbrUM69kuD-FMRnbLVm/pub?output=csv';
const REFRESH=30;
let tmr=null,cd=REFRESH,prevName='';

function pad(n){return String(n).padStart(2,'0');}
function tick(){const n=new Date();document.getElementById('clk').textContent=`${pad(n.getHours())}:${pad(n.getMinutes())}`;}
setInterval(tick,1000);tick();

function fixURL(raw){
  const u=(raw||'').trim();
  if(!u)return'';
  if(u.includes('output=csv')||u.includes('/pub?'))return u;
  const m=u.match(/\/spreadsheets\/d\/([a-zA-Z0-9_-]+)/);
  if(m){const g=(u.match(/[#&?]gid=(\d+)/)||[])[1]||'0';return`https://docs.google.com/spreadsheets/d/${m[1]}/pub?gid=${g}&single=true&output=csv`;}
  return u;
}
function isHTML(t){const s=t.trim();return s.startsWith('<!')||s.startsWith('<html');}

function parseCSV(txt){
  const lines=txt.split('\n');
  function sr(line){const v=[];let c='',q=0;for(const ch of line){if(ch==='"'){q=1-q;}else if(ch===','&&!q){v.push(c.replace(/^"|"$/g,'').trim());c='';}else c+=ch;}v.push(c.replace(/^"|"$/g,'').trim());return v;}
  let hi=0;
  for(let i=0;i<Math.min(5,lines.length);i++){if(sr(lines[i]).some(v=>v&&!/^\d+$/.test(v))){hi=i;break;}}
  const hdrs=sr(lines[hi]).map(h=>h.replace(/"/g,'').trim());
  const rows=[];
  for(let i=hi+1;i<lines.length;i++){
    if(!lines[i].trim())continue;
    const vs=sr(lines[i]);if(vs.every(v=>!v))continue;
    const row={};hdrs.forEach((h,j)=>row[h]=(vs[j]||'').trim());rows.push(row);
  }
  return{hdrs,rows};
}
function fc(hdrs,...ks){for(const k of ks){const f=hdrs.find(h=>h.toLowerCase().includes(k.toLowerCase()));if(f)return f;}return null;}
function ns(v){if(!v)return'np';const s=v.toLowerCase();if(s.includes('not')||s.includes('unpull'))return'np';if(s.includes('process')||s.includes('pull'))return'proc';if(s.includes('ready'))return'rd';if(s.includes('done')||s.includes('pick')||s.includes('collect')||s.includes('complete'))return'dn';return'np';}

function renderServing(order){
  const el=document.getElementById('ns-content');
  if(!order){
    el.innerHTML=`<div class="ns-empty"><div class="eicon">⏰</div><h2>No Orders Ready</h2><p>Orders appear here when marked Ready</p></div>`;
    prevName='';return;
  }
  const changed=prevName!==order.name;
  prevName=order.name;
  el.innerHTML=`
    <div id="ns-name" class="${changed?'pop':''}">${order.name.toUpperCase()}</div>
    <div id="ns-meta">
      ${order.inv?`<div class="ns-pill np-inv">${order.inv}</div>`:''}
      ${order.boxes?`<div class="ns-pill np-box">📦 ${order.boxes} Boxes</div>`:''}
    </div>
    <div class="ns-ready-tag">✓ Ready for Pickup</div>`;
}

function renderQueue(all,cNm,cIn,cBx,cSt){
  const ready=all.filter(o=>o.status==='rd');
  const proc =all.filter(o=>o.status==='proc');
  const np   =all.filter(o=>o.status==='np');
  const done =all.filter(o=>o.status==='dn');
  document.getElementById('qcnt').textContent=ready.length+proc.length+np.length;
  document.getElementById('q-sum').textContent=`${ready.length} of ${all.length} ready`;

  let html='';
  // Ready queue (2nd onwards)
  if(ready.length>1){
    html+=`<div class="sec-hdr">Ready — Waiting</div>`;
    html+=ready.slice(1).map((o,i)=>qrow(o,i+2,'')).join('');
  }
  if(proc.length){
    html+=`<div class="sec-hdr">Being Processed</div>`;
    html+=proc.map(o=>qrow(o,null,'qt-proc','Processing')).join('');
  }
  if(np.length){
    html+=`<div class="sec-hdr">Not Pulled Yet</div>`;
    html+=np.map(o=>qrow(o,null,'qt-np','Not Pulled')).join('');
  }
  if(done.length){
    html+=`<div class="sec-hdr">Picked Up — Done</div>`;
    html+=done.map(o=>qrow(o,null,'qt-dn','Done',true)).join('');
  }
  if(!html)html=`<div class="qempty">No orders in queue.<br>Add orders to your Google Sheet to begin.</div>`;
  document.getElementById('qlist').innerHTML=html;
}

function qrow(o,pos,tclass,tlabel,dimmed=false){
  return`<div class="qitem ${dimmed?'dimmed':''}">
    <div class="qpos">${pos||'—'}</div>
    <div class="qinfo">
      <div class="qname">${o.name}</div>
      <div class="qsub">
        ${o.inv?`<span class="qinv">${o.inv}</span>`:''}
        ${o.boxes?`<span class="qboxes">📦 ${o.boxes}</span>`:''}
        ${tclass?`<span class="qstag ${tclass}">${tlabel}</span>`:''}
      </div>
    </div>
  </div>`;
}

function startCD(){
  cd=REFRESH;clearInterval(tmr);
  tmr=setInterval(()=>{cd--;document.getElementById('cdown').textContent=`· ${cd}s`;if(cd<=0){loadData();cd=REFRESH;}},1000);
}

async function loadData(){
  const raw=localStorage.getItem(KEY)||DEFAULT;
  const url=fixURL(raw);
  if(!url){document.getElementById('ov').style.display='flex';return;}
  document.getElementById('ltxt').textContent='Updating…';
  try{
    const res=await fetch(url+'&_='+Date.now());
    if(!res.ok)throw new Error('HTTP '+res.status);
    const txt=await res.text();
    if(isHTML(txt))throw new Error('WRONG_URL');
    const{hdrs,rows}=parseCSV(txt);
    const cNm=fc(hdrs,'customer name','name','customer','cust');
    const cIn=fc(hdrs,'invoice','inv');
    const cBx=fc(hdrs,'box','qty','quantity','pcs');
    const cSt=fc(hdrs,'status','order status');

    const orders=rows
      .filter(r=>cNm?r[cNm]:Object.values(r).some(v=>v))
      .map(r=>({name:(cNm?r[cNm]:''),'inv':cIn?r[cIn]:'',boxes:cBx?r[cBx]:'',status:ns(cSt?r[cSt]:'')}))
      .filter(o=>o.name);

    const sortOrder={rd:0,proc:1,np:2,dn:3};
    orders.sort((a,b)=>sortOrder[a.status]-sortOrder[b.status]);

    const readyOrders=orders.filter(o=>o.status==='rd');
    renderServing(readyOrders[0]||null);
    renderQueue(orders,cNm,cIn,cBx,cSt);

    const n=new Date();
    document.getElementById('last-upd').textContent=`Updated ${n.toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit',second:'2-digit'})}`;
    document.getElementById('ltxt').textContent='Live';
    startCD();
  }catch(e){
    document.getElementById('ltxt').textContent='Error';
    document.getElementById('last-upd').textContent=e.message==='WRONG_URL'?'Wrong URL — check Settings':'Load failed — retrying…';
    if(e.message!=='WRONG_URL')setTimeout(loadData,15000);
  }
}

async function connectOv(){
  const raw=document.getElementById('ov-url').value.trim();
  const url=fixURL(raw)||DEFAULT;
  const err=document.getElementById('ov-err');
  err.textContent='Testing…';
  try{
    const r=await fetch(url);if(!r.ok)throw new Error('HTTP');
    const t=await r.text();if(isHTML(t))throw new Error('HTML');
    localStorage.setItem(KEY,url);
    document.getElementById('ov').style.display='none';
    loadData();
  }catch(e){
    err.textContent=e.message==='HTML'?'Edit link detected — use File → Publish to web → CSV.':'Cannot connect. Check URL.';
  }
}

if(!localStorage.getItem(KEY))localStorage.setItem(KEY,DEFAULT);
loadData();
</script>
</body>
</html>
