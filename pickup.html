<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex">
  <meta name="theme-color" content="#E8711A">
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='14' fill='%23E8711A'/%3E%3Ctext x='32' y='43' font-family='Arial,Helvetica,sans-serif' font-size='26' font-weight='900' fill='%23fff' text-anchor='middle'%3EOM%3C/text%3E%3C/svg%3E">
  <title>Customer Pickup — OM Produce</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@300;400;600;700;800;900&family=Barlow:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/tokens.css">
  <link rel="stylesheet" href="assets/base.css">
  <style>
    html, body { height: 100%; overflow: hidden; }
    body { display: flex; flex-direction: column; }

    .main { flex: 1; display: grid; grid-template-columns: 1fr 1fr; overflow: hidden; }

    /* Now Serving (left) */
    .ns { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 40px 48px; border-right: 1px solid var(--border); position: relative; background: linear-gradient(160deg, #fff 60%, #F6FBF0 100%); }
    .ns::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px; background: linear-gradient(90deg, transparent, var(--olive), transparent); }
    .ns-eyebrow { font-family: var(--f-head); font-size: 13px; font-weight: 700; letter-spacing: 5px; text-transform: uppercase; color: var(--olive); margin-bottom: 22px; display: flex; align-items: center; gap: 14px; width: 100%; justify-content: center; }
    .ns-eyebrow::before, .ns-eyebrow::after { content: ''; flex: 1; height: 1px; background: var(--olive-m); }
    #ns-name { font-family: var(--f-head); font-size: clamp(44px, 7vw, 92px); font-weight: 900; text-align: center; line-height: 1; text-transform: uppercase; letter-spacing: 1px; word-break: break-word; }
    #ns-name.pop { animation: pop .4s ease-out; }
    @keyframes pop { from { opacity: 0; transform: scale(.96) translateY(8px); } to { opacity: 1; transform: none; } }
    .ns-ready-tag { margin-top: 24px; display: inline-flex; align-items: center; gap: 8px; background: var(--olive); color: #fff; padding: 10px 28px; border-radius: 5px; font-family: var(--f-head); font-size: 20px; font-weight: 900; letter-spacing: 2px; text-transform: uppercase; }
    .ns-empty { text-align: center; }
    .ns-empty .eicon { font-size: 52px; opacity: .2; margin-bottom: 20px; }
    .ns-empty h2 { font-family: var(--f-head); font-size: 28px; font-weight: 700; text-transform: uppercase; letter-spacing: 2px; color: var(--muted); }
    .ns-empty p { color: var(--muted2); margin-top: 8px; font-size: 15px; }

    /* Queue (right) */
    .qpanel { display: flex; flex-direction: column; overflow: hidden; background: var(--surface); }
    .qhdr { display: flex; align-items: center; gap: 12px; padding: 14px 28px; flex-shrink: 0; background: #fff; border-bottom: 1px solid var(--border); }
    .qlabel { font-family: var(--f-head); font-size: 16px; font-weight: 800; letter-spacing: 2px; text-transform: uppercase; color: var(--muted); }
    .qbadge { background: var(--orange-l); color: var(--orange); border: 1px solid var(--orange-m); border-radius: 20px; padding: 3px 12px; font-family: var(--f-head); font-size: 17px; font-weight: 800; }
    .qpage { margin-left: auto; display: flex; align-items: center; gap: 12px; }
    .qpage .pglbl { font-family: var(--f-head); font-size: 12px; font-weight: 700; color: var(--muted); letter-spacing: .5px; white-space: nowrap; }
    .qdots { display: flex; gap: 6px; }
    .qdot { width: 9px; height: 9px; border-radius: 50%; background: var(--border2); transition: background .3s, transform .3s; }
    .qdot.on { background: var(--orange); transform: scale(1.25); }
    .qscroll { flex: 1; overflow-y: auto; }
    .sec-hdr { padding: 7px 28px; font-family: var(--f-head); font-size: 11px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; color: var(--muted); background: var(--surface2); border-bottom: 1px solid var(--border); }
    .qitem { display: flex; align-items: center; gap: 14px; padding: 14px 28px; border-bottom: 1px solid var(--border); background: #fff; }
    .qpos { font-family: var(--f-head); font-size: 26px; font-weight: 900; color: var(--muted2); min-width: 36px; }
    .qinfo { flex: 1; }
    .qname { font-family: var(--f-head); font-size: 30px; font-weight: 800; line-height: 1; }
    .qsub { display: flex; gap: 10px; align-items: center; margin-top: 4px; }
    .qeta { margin-left: auto; flex-shrink: 0; font-family: var(--f-head); font-size: 17px; font-weight: 800; letter-spacing: .3px; }
    .qeta.ready    { color: var(--olive); }
    .qeta.pulling  { color: var(--amber); }
    .qeta.received { color: var(--muted); font-weight: 700; }
    .qempty { text-align: center; padding: 48px 28px; color: var(--muted); font-size: 14px; line-height: 1.6; }

    @media (max-width: 900px) {
      .main { grid-template-columns: 1fr; overflow-y: auto; }
      .ns { border-right: none; border-bottom: 1px solid var(--border); padding: 24px; max-height: 45vh; }
      .qname { font-size: 24px; }
    }
  </style>
</head>
<body>
  <div class="ov" id="ov" style="display:none">
    <div class="ovb">
      <div class="ov-icon">OM</div>
      <h1>Customer Pickup</h1>
      <p>Not configured yet. Open <strong>Settings</strong> to connect the data source.</p>
      <a class="ov-btn" href="index.html" style="display:block;text-decoration:none">Open Settings</a>
    </div>
  </div>

  <div class="topbar">
    <div class="logo-wrap">
      <div class="logo-sq">OM</div>
      <div class="logo-name"><em>OM</em> Produce</div>
    </div>
    <div class="screen-tag">🛒 Customer Pickup</div>
    <div class="tb-right">
      <div class="live-pill" id="lpill"><div class="ldot"></div><span id="ltxt">LIVE</span></div>
      <div class="clock-wrap"><div class="clock big" id="clk">--:--</div><div class="dateline" id="dln">—</div></div>
    </div>
  </div>

  <div class="prep" id="prep" style="display:none">
    <div class="prep-lbl"><div class="ldot"></div>Now Preparing</div>
    <div class="prep-list" id="prep-list"></div>
  </div>

  <div class="main">
    <div class="ns">
      <div class="ns-eyebrow">Now Ready</div>
      <div id="ns-content"><div class="ns-empty"><div class="eicon">⏳</div><h2>Loading…</h2></div></div>
    </div>
    <div class="qpanel">
      <div class="qhdr">
        <div class="qlabel">In Progress</div>
        <div class="qbadge" id="qcnt">0</div>
        <div class="qpage" id="qpage"></div>
      </div>
      <div class="qscroll scroll" id="qlist"></div>
    </div>
  </div>

  <div class="btm">
    <span class="demo-tag" id="demo" style="display:none">DEMO DATA</span>
    <span>OM Produce Display System</span>
    <div class="btm-r">
      <span id="last-upd">—</span>
      <span id="cdown"></span>
      <a href="index.html">⚙ Settings</a>
    </div>
  </div>

  <script src="assets/env.js"></script>
  <script src="assets/config.js"></script>
  <script src="assets/sample.js"></script>
  <script src="assets/api.js"></script>
  <script src="assets/pickup.js"></script>
</body>
</html>
