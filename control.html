<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="robots" content="noindex">
  <meta name="theme-color" content="#E8711A">
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='14' fill='%23E8711A'/%3E%3Ctext x='32' y='43' font-family='Arial,Helvetica,sans-serif' font-size='26' font-weight='900' fill='%23fff' text-anchor='middle'%3EOM%3C/text%3E%3C/svg%3E">
  <title>Warehouse Control — OM Produce</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800;900&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/tokens.css">
  <link rel="stylesheet" href="assets/base.css">
  <style>
    html, body { height: 100%; }
    body { display: flex; flex-direction: column; overflow: hidden; }
    .summary { display: flex; align-items: center; gap: 8px; padding: 10px 24px; flex-shrink: 0; background: var(--surface); border-bottom: 1px solid var(--border); flex-wrap: wrap; }
    .slabel { font-family: var(--f-head); font-size: 11px; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase; color: var(--muted); margin-right: 4px; }
    .pullbadge { margin-left: auto; font-family: var(--f-head); font-size: 13px; font-weight: 800; color: var(--olive); }

    /* summary chips double as filters — big tap targets */
    .chip { cursor: pointer; border-radius: 8px; padding: 8px 16px; user-select: none; -webkit-user-select: none; }
    .chip.on { outline: 3px solid var(--orange); outline-offset: 1px; }
    .chip:active { transform: scale(.97); }

    .board { flex: 1; overflow-y: auto; padding: 14px 18px 28px; display: flex; flex-direction: column; gap: 12px; align-content: start; }

    /* ── order card: info | steppers | times | one big action ── */
    .ctl-card {
      display: grid;
      grid-template-columns: minmax(210px, 1.3fr) auto auto 1fr minmax(180px, auto);
      grid-template-areas: "id boxes est times act";
      gap: 10px 24px; align-items: center;
      background: #fff; border: 1px solid var(--border); border-radius: 14px;
      padding: 16px 20px; border-left: 6px solid var(--border2);
    }
    .ctl-card.received { border-left-color: var(--red); }
    .ctl-card.pulling  { border-left-color: var(--amber); }
    .ctl-card.ready    { border-left-color: var(--olive); }
    .ctl-card.invoiced { border-left-color: var(--blue); }
    .ctl-card.pull-on  { box-shadow: 0 0 0 3px var(--olive-m) inset; }
    /* Wide: the wrapper dissolves so each stepper lands in its grid area.
       Narrow (iPad portrait): it becomes a flex row spanning the card. */
    .cc-steppers { display: contents; }
    @media (max-width: 1180px) {
      .ctl-card {
        grid-template-columns: 1fr auto;
        grid-template-areas: "id act" "steppers steppers" "times times";
      }
      .cc-steppers { display: flex; gap: 24px; grid-area: steppers; }
    }

    /* identity */
    .cc-id { grid-area: id; display: flex; flex-direction: column; justify-content: center; gap: 6px; min-width: 0; }
    .cc-name { font-family: var(--f-head); font-size: 30px; font-weight: 800; line-height: .95; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .cc-meta { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
    .cc-oid { font-size: 12px; color: var(--muted); font-family: monospace; }
    .cc-arr { font-size: 12px; color: var(--olive); font-weight: 700; }
    .cc-elapsed { font-family: var(--f-head); font-size: 13px; font-weight: 700; color: var(--muted); }
    .cc-elapsed.warn { color: var(--red); }
    .addons { display: flex; flex-wrap: wrap; gap: 5px; }
    .addon { background: var(--surface2); border: 1px solid var(--border); border-radius: 4px; padding: 2px 8px; font-size: 12px; }

    /* steppers (boxes + estimate) */
    .cell { display: flex; flex-direction: column; gap: 6px; justify-content: center; }
    .cell.boxes { grid-area: boxes; }
    .cell.est { grid-area: est; }
    @media (max-width: 1180px) { .cell.boxes, .cell.est { grid-area: auto; } }
    .cell .lbl { font-family: var(--f-head); font-size: 11px; font-weight: 800; letter-spacing: 1.2px; text-transform: uppercase; color: var(--muted); }
    .stepper { display: flex; align-items: center; border: 1px solid var(--border); border-radius: 10px; overflow: hidden; width: max-content; background: var(--surface); }
    .stepper button { background: transparent; border: none; width: 52px; height: 52px; font-size: 26px; font-family: var(--f-head); font-weight: 800; color: var(--text); cursor: pointer; }
    .stepper button:active { background: var(--surface2); }
    .stepper .val { min-width: 54px; text-align: center; font-family: var(--f-head); font-size: 24px; font-weight: 900; }
    .stepper .val.box { color: var(--orange); }
    .stepper .val.est { color: var(--amber); font-size: 20px; }

    /* compact editable time chips (Start / End / Pickup) */
    .cc-times { grid-area: times; display: flex; gap: 10px; flex-wrap: wrap; align-items: center; justify-content: flex-start; }
    .tchip { display: flex; align-items: center; gap: 6px; border: 1px solid var(--border); background: var(--surface); border-radius: 10px; padding: 4px 6px 4px 12px; }
    .tchip .tl { font-family: var(--f-head); font-size: 11px; font-weight: 800; letter-spacing: 1px; text-transform: uppercase; color: var(--muted); }
    .tchip input[type=time] { font-family: var(--f-head); font-size: 16px; font-weight: 800; border: none; background: transparent; color: var(--text); width: 116px; height: 40px; }
    .tchip input[type=time]:focus { outline: none; }
    .tchip.set { border-color: var(--olive-m); background: var(--olive-l); }
    .tchip.set input { color: var(--olive); }
    .tclr { background: none; border: none; color: var(--muted2); font-size: 17px; line-height: 1; cursor: pointer; padding: 4px 6px; }
    .tclr:active { color: var(--red); }

    /* the ONE next-step button per order */
    .cc-act { grid-area: act; justify-self: end; }
    .act-btn {
      min-height: 60px; min-width: 180px; padding: 0 24px; border: none; border-radius: 12px;
      font-family: var(--f-head); font-size: 19px; font-weight: 900; letter-spacing: 1px;
      text-transform: uppercase; color: #fff; cursor: pointer;
      box-shadow: 0 2px 6px rgba(0,0,0,.08);
    }
    .act-btn:active { transform: scale(.98); filter: brightness(.95); }
    .act-btn:disabled { opacity: .55; }
    .act-btn.start  { background: var(--amber); }
    .act-btn.end    { background: var(--olive); }
    .act-btn.pickup { background: var(--orange); }
  </style>
</head>
<body>
  <div class="topbar">
    <div class="logo-wrap">
      <div class="logo-sq">OM</div>
      <div class="logo-name"><em>OM</em> Produce</div>
    </div>
    <div class="screen-tag">📦 Warehouse Control</div>
    <div class="tb-right">
      <div class="live-pill" id="lpill"><div class="ldot"></div><span id="ltxt">LIVE</span></div>
      <div class="clock-wrap"><div class="clock big" id="clk">--:--</div><div class="dateline" id="dln">—</div></div>
    </div>
  </div>

  <div class="summary">
    <div class="slabel">Tap to filter</div>
    <div class="chip total on" data-f="all" role="button"><span class="chip-n" id="ct">0</span><span class="chip-l">All</span></div>
    <div class="chip pulling" data-f="pulling" role="button"><span class="chip-n" id="c-pulling">0</span><span class="chip-l">Pulling</span></div>
    <div class="chip received" data-f="received" role="button"><span class="chip-n" id="c-received">0</span><span class="chip-l">Queue</span></div>
    <div class="chip ready" data-f="ready" role="button"><span class="chip-n" id="c-ready">0</span><span class="chip-l">Ready</span></div>
    <div class="pullbadge"><span id="pullcount">0</span> / 3 pulling now</div>
  </div>

  <div class="board scroll" id="board"></div>

  <div class="btm">
    <span class="demo-tag" id="demo" style="display:none">DEMO — taps are local only</span>
    <div class="btm-r"><span id="last-upd">—</span><span id="cdown"></span><a href="index.html">⚙ Settings</a></div>
  </div>

  <script src="assets/env.js"></script>
  <script src="assets/config.js"></script>
  <script src="assets/sample.js"></script>
  <script src="assets/api.js"></script>
  <script src="assets/ui.js"></script>
  <script src="assets/control.js"></script>
</body>
</html>
