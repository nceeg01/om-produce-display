<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Warehouse Control — OM Produce</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800;900&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/tokens.css">
  <link rel="stylesheet" href="assets/base.css">
  <style>
    html, body { height: 100%; }
    body { display: flex; flex-direction: column; overflow: hidden; }
    .summary { display: flex; align-items: center; gap: 8px; padding: 8px 24px; flex-shrink: 0; background: var(--surface); border-bottom: 1px solid var(--border); flex-wrap: wrap; }
    .slabel { font-family: var(--f-head); font-size: 11px; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase; color: var(--muted); margin-right: 4px; }
    .pullbadge { margin-left: auto; font-family: var(--f-head); font-size: 13px; font-weight: 800; color: var(--olive); }

    .board { flex: 1; overflow-y: auto; padding: 16px 24px 28px; display: grid; grid-template-columns: repeat(auto-fill, minmax(330px, 1fr)); gap: 14px; align-content: start; }

    .ctl-card { background: #fff; border: 1px solid var(--border); border-radius: 12px; padding: 16px; border-top: 5px solid var(--border2); display: flex; flex-direction: column; gap: 12px; }
    .ctl-card.received { border-top-color: var(--red); }
    .ctl-card.pulling  { border-top-color: var(--amber); }
    .ctl-card.ready    { border-top-color: var(--olive); }
    .ctl-card.invoiced { border-top-color: var(--blue); }
    .ctl-card.done     { border-top-color: var(--gray); opacity: .55; }
    .ctl-card.pull-on  { box-shadow: 0 0 0 3px var(--olive-m); border-top-color: var(--olive); }

    .cc-top { display: flex; align-items: flex-start; gap: 10px; }
    .cc-name { font-family: var(--f-head); font-size: 30px; font-weight: 800; line-height: .95; flex: 1; }
    .cc-oid { font-size: 11px; color: var(--muted); font-family: monospace; }
    .cc-arr { font-size: 11px; color: var(--olive); font-weight: 600; margin-top: 2px; }
    .star { font-size: 30px; line-height: 1; cursor: pointer; user-select: none; filter: grayscale(1); opacity: .35; transition: all .15s; }
    .star.on { filter: none; opacity: 1; transform: scale(1.05); }
    .addons { display: flex; flex-wrap: wrap; gap: 5px; }
    .addon { background: var(--surface2); border: 1px solid var(--border); border-radius: 4px; padding: 2px 8px; font-size: 12px; }

    .rowline { display: flex; align-items: center; gap: 10px; }
    .rl-lbl { font-family: var(--f-head); font-size: 12px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; color: var(--muted); width: 56px; }
    .stepper { display: flex; align-items: center; gap: 0; border: 1px solid var(--border); border-radius: 8px; overflow: hidden; }
    .stepper button { background: var(--surface); border: none; width: 46px; height: 44px; font-size: 24px; font-family: var(--f-head); font-weight: 800; color: var(--text); cursor: pointer; }
    .stepper button:active { background: var(--surface2); }
    .stepper .val { min-width: 56px; text-align: center; font-family: var(--f-head); font-size: 24px; font-weight: 900; }
    .stepper .val.box { color: var(--orange); }
    .waitchip { background: var(--amber-l); border: 1px solid var(--amber-m); color: var(--amber); border-radius: 8px; height: 44px; padding: 0 16px; font-family: var(--f-head); font-size: 16px; font-weight: 800; cursor: pointer; }
    .pulltimer { margin-left: auto; font-family: var(--f-head); font-size: 14px; font-weight: 700; color: var(--muted); }
    .pulltimer.warn { color: var(--red); }

    .statusrow { display: grid; grid-template-columns: repeat(5, 1fr); gap: 6px; }
    .sbtn { padding: 10px 4px; border: 1px solid var(--border); border-radius: 8px; background: #fff; font-family: var(--f-head); font-size: 12px; font-weight: 800; letter-spacing: .5px; text-transform: uppercase; color: var(--muted); cursor: pointer; }
    .sbtn:active { transform: scale(.97); }
    .sbtn.on.received { background: var(--red-l); color: var(--red); border-color: var(--red-m); }
    .sbtn.on.pulling  { background: var(--amber-l); color: var(--amber); border-color: var(--amber-m); }
    .sbtn.on.ready    { background: var(--olive-l); color: var(--olive); border-color: var(--olive-m); }
    .sbtn.on.invoiced { background: var(--blue-l); color: var(--blue); border-color: var(--blue-m); }
    .sbtn.on.done     { background: var(--gray-l); color: var(--gray); border-color: var(--border2); }
  </style>
</head>
<body>
  <div class="topbar">
    <div class="logo-wrap">
      <div class="logo-sq">OM</div>
      <div class="logo-name"><em>OM</em> Produce</div>
    </div>
    <div class="screen-tag">📦 Warehouse Control</div>
    <div class="tb-right">
      <div class="live-pill" id="lpill"><div class="ldot"></div><span id="ltxt">LIVE</span></div>
      <div class="clock-wrap"><div class="clock big" id="clk">--:--</div><div class="dateline" id="dln">—</div></div>
    </div>
  </div>

  <div class="summary">
    <div class="slabel">Queue</div>
    <div class="chip total"><span class="chip-n" id="ct">0</span><span class="chip-l">Active</span></div>
    <div class="chip pulling"><span class="chip-n" id="c-pulling">0</span><span class="chip-l">Pulling</span></div>
    <div class="chip received"><span class="chip-n" id="c-received">0</span><span class="chip-l">Received</span></div>
    <div class="chip ready"><span class="chip-n" id="c-ready">0</span><span class="chip-l">Ready</span></div>
    <div class="pullbadge"><span id="pullcount">0</span> / 3 pulling now</div>
  </div>

  <div class="board scroll" id="board"></div>

  <div class="btm">
    <span class="demo-tag" id="demo" style="display:none">DEMO — taps are local only</span>
    <div class="btm-r"><span id="last-upd">—</span><span id="cdown"></span><a href="index.html">⚙ Settings</a></div>
  </div>

  <script src="assets/config.js"></script>
  <script src="assets/sample.js"></script>
  <script src="assets/api.js"></script>
  <script src="assets/ui.js"></script>
  <script src="assets/control.js"></script>
</body>
</html>
