<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="robots" content="noindex">
  <meta name="theme-color" content="#E8711A">
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='14' fill='%23E8711A'/%3E%3Ctext x='32' y='43' font-family='Arial,Helvetica,sans-serif' font-size='26' font-weight='900' fill='%23fff' text-anchor='middle'%3EOM%3C/text%3E%3C/svg%3E">
  <title>Warehouse Control — OM Produce</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800;900&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/tokens.css">
  <link rel="stylesheet" href="assets/base.css">
  <style>
    html, body { height: 100%; }
    body { display: flex; flex-direction: column; overflow: hidden; }
    .summary { display: flex; align-items: center; gap: 8px; padding: 8px 24px; flex-shrink: 0; background: var(--surface); border-bottom: 1px solid var(--border); flex-wrap: wrap; }
    .slabel { font-family: var(--f-head); font-size: 11px; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase; color: var(--muted); margin-right: 4px; }
    .pullbadge { margin-left: auto; font-family: var(--f-head); font-size: 13px; font-weight: 800; color: var(--olive); }

    /* Column header strip (matches the per-order row cells) */
    .colhdr { display: flex; gap: 14px 18px; padding: 8px 18px; flex-shrink: 0; background: #fff; border-bottom: 1px solid var(--border); }
    .colhdr span { font-family: var(--f-head); font-size: 10px; font-weight: 800; letter-spacing: 1.2px; text-transform: uppercase; color: var(--muted2); }
    .colhdr .h-id { flex: 1 1 220px; min-width: 190px; }
    .colhdr .h-cell { min-width: 116px; }
    @media (max-width: 820px) { .colhdr { display: none; } }

    .board { flex: 1; overflow-y: auto; padding: 14px 18px 28px; display: flex; flex-direction: column; gap: 12px; align-content: start; }

    .ctl-card { display: flex; flex-wrap: wrap; align-items: stretch; gap: 14px 18px; background: #fff; border: 1px solid var(--border); border-radius: 12px; padding: 14px 18px; border-left: 6px solid var(--border2); }
    .ctl-card.received { border-left-color: var(--red); }
    .ctl-card.pulling  { border-left-color: var(--amber); }
    .ctl-card.ready    { border-left-color: var(--olive); }
    .ctl-card.invoiced { border-left-color: var(--blue); }
    .ctl-card.done     { border-left-color: var(--gray); opacity: .6; }
    .ctl-card.pull-on  { box-shadow: 0 0 0 3px var(--olive-m) inset; }

    /* identity cell */
    .cc-id { flex: 1 1 220px; min-width: 190px; display: flex; flex-direction: column; justify-content: center; gap: 5px; }
    .cc-name { font-family: var(--f-head); font-size: 28px; font-weight: 800; line-height: .95; }
    .cc-meta { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
    .cc-oid { font-size: 12px; color: var(--muted); font-family: monospace; }
    .cc-arr { font-size: 11px; color: var(--olive); font-weight: 700; }
    .cc-elapsed { font-family: var(--f-head); font-size: 12px; font-weight: 700; color: var(--muted); }
    .cc-elapsed.warn { color: var(--red); }
    .addons { display: flex; flex-wrap: wrap; gap: 5px; }
    .addon { background: var(--surface2); border: 1px solid var(--border); border-radius: 4px; padding: 2px 8px; font-size: 12px; }

    /* field cell */
    .cell { display: flex; flex-direction: column; gap: 6px; justify-content: center; min-width: 116px; }
    .cell .lbl { font-family: var(--f-head); font-size: 10px; font-weight: 800; letter-spacing: 1.2px; text-transform: uppercase; color: var(--muted); }

    /* steppers (boxes + estimate) */
    .stepper { display: flex; align-items: center; border: 1px solid var(--border); border-radius: 8px; overflow: hidden; width: max-content; }
    .stepper button { background: var(--surface); border: none; width: 42px; height: 44px; font-size: 22px; font-family: var(--f-head); font-weight: 800; color: var(--text); cursor: pointer; }
    .stepper button:active { background: var(--surface2); }
    .stepper .val { min-width: 50px; text-align: center; font-family: var(--f-head); font-size: 22px; font-weight: 900; }
    .stepper .val.box { color: var(--orange); }
    .stepper .val.est { color: var(--amber); font-size: 18px; }

    /* time editor */
    .tedit { display: flex; align-items: center; gap: 6px; }
    .tedit input[type=time] { font-family: var(--f-head); font-size: 17px; font-weight: 800; border: 1px solid var(--border); border-radius: 8px; padding: 0 10px; height: 44px; background: var(--surface); color: var(--text); width: 112px; }
    .tedit input[type=time]:focus { outline: none; border-color: var(--orange); box-shadow: 0 0 0 3px rgba(232,113,26,.12); }
    .tedit input.set { border-color: var(--olive-m); background: var(--olive-l); color: var(--olive); }
    .nowbtn { height: 44px; padding: 0 12px; border: 1px solid var(--olive-m); background: #fff; color: var(--olive); border-radius: 8px; font-family: var(--f-head); font-weight: 800; font-size: 12px; letter-spacing: .5px; text-transform: uppercase; cursor: pointer; flex-shrink: 0; }
    .nowbtn:active { background: var(--olive-l); }
    .clrbtn { background: none; border: none; color: var(--muted2); font-size: 18px; line-height: 1; cursor: pointer; padding: 2px 4px; }
    .clrbtn:active { color: var(--red); }
  </style>
</head>
<body>
  <div class="topbar">
    <div class="logo-wrap">
      <div class="logo-sq">OM</div>
      <div class="logo-name"><em>OM</em> Produce</div>
    </div>
    <div class="screen-tag">📦 Warehouse Control</div>
    <div class="tb-right">
      <div class="live-pill" id="lpill"><div class="ldot"></div><span id="ltxt">LIVE</span></div>
      <div class="clock-wrap"><div class="clock big" id="clk">--:--</div><div class="dateline" id="dln">—</div></div>
    </div>
  </div>

  <div class="summary">
    <div class="slabel">Queue</div>
    <div class="chip total"><span class="chip-n" id="ct">0</span><span class="chip-l">Active</span></div>
    <div class="chip pulling"><span class="chip-n" id="c-pulling">0</span><span class="chip-l">Pulling</span></div>
    <div class="chip received"><span class="chip-n" id="c-received">0</span><span class="chip-l">Received</span></div>
    <div class="chip ready"><span class="chip-n" id="c-ready">0</span><span class="chip-l">Ready</span></div>
    <div class="pullbadge"><span id="pullcount">0</span> / 3 pulling now</div>
  </div>

  <div class="colhdr">
    <span class="h-id">Order / Customer</span>
    <span class="h-cell">Boxes</span>
    <span class="h-cell">Start</span>
    <span class="h-cell">End</span>
    <span class="h-cell">Pickup</span>
    <span class="h-cell">Est. min</span>
  </div>

  <div class="board scroll" id="board"></div>

  <div class="btm">
    <span class="demo-tag" id="demo" style="display:none">DEMO — taps are local only</span>
    <div class="btm-r"><span id="last-upd">—</span><span id="cdown"></span><a href="index.html">⚙ Settings</a></div>
  </div>

  <script src="assets/env.js"></script>
  <script src="assets/config.js"></script>
  <script src="assets/sample.js"></script>
  <script src="assets/api.js"></script>
  <script src="assets/ui.js"></script>
  <script src="assets/control.js"></script>
</body>
</html>
