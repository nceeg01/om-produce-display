<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex">
  <meta name="theme-color" content="#E8711A">
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='14' fill='%23E8711A'/%3E%3Ctext x='32' y='43' font-family='Arial,Helvetica,sans-serif' font-size='26' font-weight='900' fill='%23fff' text-anchor='middle'%3EOM%3C/text%3E%3C/svg%3E">
  <title>Warehouse — OM Produce</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@300;400;500;600;700;800;900&family=Barlow:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/tokens.css">
  <link rel="stylesheet" href="assets/base.css">
  <style>
    html, body { height: 100%; overflow: hidden; }
    body { display: flex; flex-direction: column; }

    .summary { display: flex; align-items: center; gap: 8px; padding: 10px 28px; flex-shrink: 0; background: var(--surface); border-bottom: 1px solid var(--border); flex-wrap: wrap; }
    .slabel { font-family: var(--f-head); font-size: 11px; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase; color: var(--muted); margin-right: 4px; }
    .sum-r { margin-left: auto; display: flex; gap: 16px; align-items: center; font-size: 12px; color: var(--muted); font-weight: 500; }
    .sum-r b { color: var(--text); font-family: var(--f-head); font-size: 15px; }

    .board { flex: 1; overflow-y: auto; padding: 16px 28px 24px; }
    .group { margin-bottom: 22px; }
    .group-hd { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
    .group-hd .ttl { font-family: var(--f-head); font-size: 13px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; color: var(--muted); }
    .group-hd .ct { font-family: var(--f-head); font-size: 12px; font-weight: 700; color: var(--muted2); }
    .group-hd::after { content: ''; flex: 1; height: 1px; background: var(--border); }

    .cards { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 12px; }
    .card { background: #fff; border: 1px solid var(--border); border-radius: var(--radius); padding: 14px 16px; border-left: 4px solid var(--border2); }
    .card.received { border-left-color: var(--red); }
    .card.pulling  { border-left-color: var(--amber); }
    .card.ready    { border-left-color: var(--olive); }
    .card.invoiced { border-left-color: var(--blue); }
    .card.done     { border-left-color: var(--border2); opacity: .6; }
    .card.stale    { border-left-color: var(--red); box-shadow: 0 0 0 2px var(--red-m) inset; animation: pulse 1.6s infinite; }
    @keyframes pulse { 0%,100% { box-shadow: 0 0 0 2px var(--red-m) inset; } 50% { box-shadow: 0 0 0 2px var(--red) inset; } }

    .card-top { display: flex; align-items: flex-start; justify-content: space-between; gap: 10px; }
    .cust { font-family: var(--f-head); font-size: 26px; font-weight: 800; line-height: 1; }
    .oid { font-size: 11px; color: var(--muted); font-family: monospace; margin-top: 4px; }
    .boxes { text-align: center; flex-shrink: 0; }
    .boxes .n { font-family: var(--f-head); font-size: 30px; font-weight: 900; color: var(--orange); line-height: 1; }
    .boxes .l { font-size: 9px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; color: var(--muted); }

    .addons { display: flex; flex-wrap: wrap; gap: 5px; margin-top: 10px; }
    .addon { background: var(--surface2); border: 1px solid var(--border); border-radius: 4px; padding: 2px 8px; font-size: 11px; color: var(--text); }
    .notes { margin-top: 8px; font-size: 12px; color: var(--muted); font-style: italic; }

    .card-bot { display: flex; align-items: center; justify-content: space-between; gap: 8px; margin-top: 12px; padding-top: 10px; border-top: 1px solid var(--border); }
    .timer { font-family: var(--f-head); font-size: 13px; font-weight: 700; color: var(--muted); }
    .timer.warn { color: var(--red); }
    .eta { font-size: 12px; color: var(--olive); font-weight: 600; }
  </style>
</head>
<body>
  <div class="ov" id="ov" style="display:none">
    <div class="ovb">
      <div class="ov-icon">OM</div>
      <h1>Warehouse Display</h1>
      <p>Not configured yet. Open <strong>Settings</strong> to paste the data connection (Web App URL + token).</p>
      <a class="ov-btn" href="index.html" style="display:block;text-decoration:none">Open Settings</a>
    </div>
  </div>

  <div class="topbar">
    <div class="logo-wrap">
      <div class="logo-sq">OM</div>
      <div class="logo-name"><em>OM</em> Produce</div>
    </div>
    <div class="screen-tag">📦 Warehouse</div>
    <div class="tb-right">
      <div class="live-pill" id="lpill"><div class="ldot"></div><span id="ltxt">LIVE</span></div>
      <div class="clock-wrap"><div class="clock big" id="clk">--:--</div><div class="dateline" id="dln">—</div></div>
    </div>
  </div>

  <div class="prep" id="prep" style="display:none">
    <div class="prep-lbl"><div class="ldot"></div>Now Pulling</div>
    <div class="prep-list" id="prep-list"></div>
  </div>

  <div class="summary">
    <div class="slabel">Orders</div>
    <div class="chip total"><span class="chip-n" id="ct">0</span><span class="chip-l">Total</span></div>
    <div class="chip pulling"><span class="chip-n" id="c-pulling">0</span><span class="chip-l">Pulling</span></div>
    <div class="chip received"><span class="chip-n" id="c-received">0</span><span class="chip-l">Received</span></div>
    <div class="chip ready"><span class="chip-n" id="c-ready">0</span><span class="chip-l">Ready</span></div>
    <div class="chip invoiced"><span class="chip-n" id="c-invoiced">0</span><span class="chip-l">Invoiced</span></div>
    <div class="sum-r">
      <span>📦 <b id="boxtotal">0</b> boxes</span>
      <span>⏱ avg pull <b id="avgpull">—</b></span>
    </div>
  </div>

  <div class="board scroll" id="board"></div>

  <div class="btm">
    <span class="demo-tag" id="demo" style="display:none">DEMO DATA</span>
    <div class="btm-r">
      <span id="last-upd">—</span>
      <span id="cdown"></span>
      <a href="control.html">📲 Control</a>
      <a href="index.html">⚙ Settings</a>
    </div>
  </div>

  <script src="assets/env.js"></script>
  <script src="assets/config.js"></script>
  <script src="assets/sample.js"></script>
  <script src="assets/api.js"></script>
  <script src="assets/warehouse.js"></script>
</body>
</html>
