<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex">
  <meta name="theme-color" content="#E8711A">
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='14' fill='%23E8711A'/%3E%3Ctext x='32' y='43' font-family='Arial,Helvetica,sans-serif' font-size='26' font-weight='900' fill='%23fff' text-anchor='middle'%3EOM%3C/text%3E%3C/svg%3E">
  <title>Customer Check-in — OM Produce</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800;900&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/tokens.css">
  <link rel="stylesheet" href="assets/base.css">
  <style>
    html, body { height: 100%; }
    body { display: flex; flex-direction: column; overflow: hidden; }
    .main { flex: 1; display: grid; grid-template-columns: 1.6fr 1fr; overflow: hidden; }
    .col { display: flex; flex-direction: column; overflow: hidden; }
    .col.queue { border-right: 1px solid var(--border); }
    .col-hd { display: flex; align-items: center; gap: 12px; padding: 12px 24px; flex-shrink: 0; background: #fff; border-bottom: 1px solid var(--border); }
    .col-hd .t { font-family: var(--f-head); font-size: 17px; font-weight: 800; letter-spacing: 2px; text-transform: uppercase; }
    .col-hd .cnt { margin-left: auto; font-family: var(--f-head); font-size: 14px; font-weight: 800; color: var(--muted); }
    .search { margin: 10px 24px 0; }
    .search input { width: 100%; border: 1px solid var(--border); border-radius: 8px; padding: 10px 14px; font-size: 14px; outline: none; }
    .search input:focus { border-color: var(--orange); }
    .list { flex: 1; overflow-y: auto; padding: 12px 18px 24px; }

    .qrow { display: flex; align-items: center; gap: 12px; background: #fff; border: 1px solid var(--border); border-radius: 10px; padding: 12px 14px; margin-bottom: 8px; border-left: 5px solid var(--border2); }
    .qrow.received { border-left-color: var(--red); }
    .qrow.pulling  { border-left-color: var(--amber); }
    .qrow.ready    { border-left-color: var(--olive); }
    .qrow.invoiced { border-left-color: var(--blue); }
    .qpos { font-family: var(--f-head); font-size: 22px; font-weight: 900; color: var(--muted2); min-width: 28px; text-align: center; }
    .qmid { flex: 1; min-width: 0; }
    .qnm { font-family: var(--f-head); font-size: 24px; font-weight: 800; line-height: 1; }
    .qsub { display: flex; gap: 8px; align-items: center; margin-top: 4px; font-size: 11px; color: var(--muted); }
    .arr { color: var(--olive); font-weight: 700; }
    .qact { display: flex; align-items: center; gap: 6px; }
    .here-btn { border: 1px solid var(--olive-m); background: #fff; color: var(--olive); font-family: var(--f-head); font-weight: 800; font-size: 14px; letter-spacing: .5px; text-transform: uppercase; border-radius: 9px; padding: 0 18px; min-height: 46px; cursor: pointer; }
    .here-btn.on { background: var(--olive); color: #fff; }
    .here-btn:active { transform: scale(.97); }
    .mvbtn { width: 46px; height: 40px; border: 1px solid var(--border); background: var(--surface); border-radius: 8px; font-size: 18px; cursor: pointer; color: var(--text); }
    .mvbtn:active { background: var(--surface2); }
    .mvcol { display: flex; flex-direction: column; gap: 4px; }

    .add { padding: 18px 22px; }
    .add label { display: block; font-family: var(--f-head); font-size: 12px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; color: var(--muted); margin: 12px 0 6px; }
    .add input { width: 100%; border: 1px solid var(--border); border-radius: 8px; padding: 12px 14px; font-size: 16px; outline: none; }
    .add input:focus { border-color: var(--orange); }
    .add .big-name { font-size: 22px; font-family: var(--f-head); font-weight: 700; }
    .add-btn { width: 100%; margin-top: 16px; background: var(--orange); color: #fff; border: none; border-radius: 10px; padding: 16px; font-family: var(--f-head); font-size: 18px; font-weight: 800; letter-spacing: 1px; text-transform: uppercase; cursor: pointer; }
    .add-btn:active { filter: brightness(.96); }
    .add-hint { font-size: 12px; color: var(--muted2); margin-top: 12px; line-height: 1.5; }

    /* Customer pickup-time editor (op3 can record collection) */
    .qact { flex-wrap: wrap; justify-content: flex-end; }
    .pu-cell { display: flex; flex-direction: column; gap: 4px; }
    .pu-lbl { font-family: var(--f-head); font-size: 9px; font-weight: 800; letter-spacing: 1px; text-transform: uppercase; color: var(--muted2); }
    .pickedit { display: flex; align-items: center; gap: 6px; }
    .pickedit input[type=time] { font-family: var(--f-head); font-size: 16px; font-weight: 800; border: 1px solid var(--border); border-radius: 8px; padding: 0 8px; height: 46px; background: var(--surface); color: var(--text); width: 104px; }
    .pickedit input.set { border-color: var(--olive-m); background: var(--olive-l); color: var(--olive); }
    .pickedit input[type=time]:focus { outline: none; border-color: var(--orange); }
    .pu-now { height: 46px; padding: 0 14px; border: 1px solid var(--olive-m); background: #fff; color: var(--olive); border-radius: 8px; font-family: var(--f-head); font-weight: 800; font-size: 12px; letter-spacing: .5px; text-transform: uppercase; cursor: pointer; }
    .pu-now:active { background: var(--olive-l); transform: scale(.97); }
  </style>
</head>
<body>
  <div class="topbar">
    <div class="logo-wrap"><div class="logo-sq">OM</div><div class="logo-name"><em>OM</em> Produce</div></div>
    <div class="screen-tag">🙋 Check-in &amp; Queue</div>
    <div class="tb-right">
      <div class="live-pill" id="lpill"><div class="ldot"></div><span id="ltxt">LIVE</span></div>
      <div class="clock-wrap"><div class="clock" id="clk">--:--</div><div class="dateline" id="dln">—</div></div>
    </div>
  </div>

  <div class="main">
    <div class="col queue">
      <div class="col-hd"><span class="t">Today's Queue</span><span class="cnt" id="qcnt">0</span></div>
      <div class="search"><input id="search" placeholder="Filter by customer name…"></div>
      <div class="list scroll" id="qlist"></div>
    </div>
    <div class="col">
      <div class="col-hd"><span class="t">Quick Add Walk-in</span></div>
      <div class="add">
        <label>Customer name</label>
        <input class="big-name" id="qa-name" placeholder="e.g. Arora Market">
        <label>Add-on (optional)</label>
        <input id="qa-addon" placeholder="e.g. Ice pack">
        <button class="add-btn" id="qa-go">+ Add &amp; Check In</button>
        <div class="add-hint">Adds the order at the front of the queue and marks the customer as <strong>here now</strong>. Warehouse sees it immediately.</div>
      </div>
    </div>
  </div>

  <div class="btm">
    <span class="demo-tag" id="demo" style="display:none">DEMO — changes are local only</span>
    <div class="btm-r"><span id="last-upd">—</span><span id="cdown"></span><a href="index.html">⚙ Settings</a></div>
  </div>

  <script src="assets/env.js"></script>
  <script src="assets/config.js"></script>
  <script src="assets/sample.js"></script>
  <script src="assets/api.js"></script>
  <script src="assets/ui.js"></script>
  <script src="assets/checkin.js"></script>
</body>
</html>
